# Sends a personal Slack DM whenever a PR is successfully merged into main.
#
# Required GitHub Actions secrets:
#   SLACK_BOT_TOKEN  — Bot User OAuth Token (xoxb-...) from your Slack app
#                      (needs the `chat:write` OAuth scope)
#   SLACK_USER_ID    — Your Slack member ID, e.g. U012AB3CD
#                      (find it: Slack → your profile → More ••• → Copy member ID)
#
# One-time Slack app setup:
#   1. Go to https://api.slack.com/apps and create a new app ("From scratch").
#   2. Under "OAuth & Permissions" add the `chat:write` bot scope.
#   3. Install the app to your workspace and copy the Bot User OAuth Token.
#   4. Add SLACK_BOT_TOKEN and SLACK_USER_ID as secrets in this repo:
#      Settings → Secrets and variables → Actions → New repository secret.

name: Notify Slack on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  notify:
    name: Send Slack DM
    # Only run when the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Check Slack secrets
        id: check_secrets
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$SLACK_USER_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SLACK_BOT_TOKEN or SLACK_USER_ID is not configured. Skipping Slack notification."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send DM via Slack
        if: steps.check_secrets.outputs.configured == 'true'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ secrets.SLACK_USER_ID }}"
            text: ":tada: PR merged in *${{ github.repository }}*"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: ":tada: *PR merged!*\n*Repo:* ${{ github.repository }}\n*PR:* <${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>\n*Author:* ${{ github.event.pull_request.user.login }}"
